version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: okey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: okey
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    ports:
      - '3000:3000'
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=production
    depends_on:
      - api
  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/okey?schema=public
    depends_on:
      - postgres

volumes:
  postgres-data:
