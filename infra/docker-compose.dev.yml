services:
  postgres:
    image: postgres:15-alpine
    container_name: okey-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: okey
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d okey"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data-dev:
